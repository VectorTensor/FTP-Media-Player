syntax = "proto3";

package anime;

service AnimeService{
  rpc Ping (PingRequest) returns (PongReply) {}
  rpc ListAnime (ListAnimeRequest) returns (ListAnimeResponse) {}
}

message PingRequest {
  string message = 1;
}

message PongReply {
  string message = 1;
}

message ListAnimeRequest{

}

message AnimeData{

  string name = 1;
  string url = 2;
  

}

message ListAnimeResponse{
  repeated AnimeData animes = 1;


}
