name: Build gRPC Base Image (Manual)

on:
  workflow_dispatch:
    inputs:
      grpc_version:
        description: 'gRPC version tag to build (e.g. v1.65.0)'
        required: true
        default: 'v1.82.0'
      image_tag:
        description: 'Additional tag for the image (optional, defaults to grpc_version)'
        required: false
        default: ''

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: grpc-cpp-builder

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ env.ECR_REPOSITORY }}" \
            || aws ecr create-repository --repository-name "${{ env.ECR_REPOSITORY }}"

      - name: Set image tags
        id: tags
        run: |
          VERSION_TAG="${{ github.event.inputs.grpc_version }}"
          EXTRA_TAG="${{ github.event.inputs.image_tag }}"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$EXTRA_TAG" ]; then
            echo "extra_tag=$EXTRA_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "extra_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker buildx build \
            --build-arg GRPC_VERSION=${{ steps.tags.outputs.version_tag }} \
            -f deploy/base/Dockerfile\
            -t $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.version_tag }} \
            -t $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.extra_tag }} \
            -t $REGISTRY/${{ env.ECR_REPOSITORY }}:latest \
            --push \
            .

      - name: Report image size
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker pull $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.version_tag }}
          docker images $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.version_tag }} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"