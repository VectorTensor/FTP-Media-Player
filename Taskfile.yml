# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  GREETING: Hello, world!
  PROGRAM: Lagrangian # name of the project
dotenv: ['.env']
tasks:
  generate:
    desc: building cmake_commands_json
    cmds:
      - echo creating the building cmake_commands_json build files.............
      - cmake -G "Ninja" -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_TOOLCHAIN_FILE={{.VCPKG_ROOT}}/scripts/buildsystems/vcpkg.cmake -B build
    silent: true
  build:
    desc: build the binary
    cmds:
      - echo building the binary..............
      - cmake --build build
    silent: true
  run:
    desc: run the program
    cmds:
      - echo running the program............
      - ./build/{{.PROGRAM}}
    silent: true
